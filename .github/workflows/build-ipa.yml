name: Build Unsigned IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift Package dependencies
        working-directory: OldOS
        run: |
          xcodebuild \
            -project OldOS.xcodeproj \
            -scheme OldOS \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build app (no signing)
        working-directory: OldOS
        run: |
          set -o pipefail
          xcodebuild \
            -project OldOS.xcodeproj \
            -scheme OldOS \
            -configuration Release \
            -sdk iphoneos \
            -clonedSourcePackagesDirPath SourcePackages \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty --color

      - name: Verify binary exists
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/build" -name "*.app" -maxdepth 2 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in build output"
            find "$RUNNER_TEMP/build" -maxdepth 3 || true
            exit 1
          fi
          echo "App bundle: $APP_PATH"
          ls -lh "$APP_PATH/"
          BINARY_NAME=$(defaults read "$APP_PATH/Info.plist" CFBundleExecutable 2>/dev/null || basename "$APP_PATH" .app)
          echo "Expected binary: $BINARY_NAME"
          if [ ! -f "$APP_PATH/$BINARY_NAME" ]; then
            echo "ERROR: Binary '$BINARY_NAME' is missing from $APP_PATH"
            exit 1
          fi
          echo "Binary found: $(ls -lh "$APP_PATH/$BINARY_NAME")"
          file "$APP_PATH/$BINARY_NAME"

      - name: Package into unsigned IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/build" -name "*.app" -maxdepth 2 | head -1)
          echo "Packaging: $APP_PATH"
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/
          cd /tmp
          zip -r OldOS-Unsigned.ipa Payload
          echo "IPA created:"
          ls -lh /tmp/OldOS-Unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OldOS-Unsigned
          path: /tmp/OldOS-Unsigned.ipa
          retention-days: 30
